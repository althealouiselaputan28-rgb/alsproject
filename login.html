<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <link rel="icon" type="image/ico" href="images/tntslogo.png" />
</head>
<body class="login-page">
    <main class="d-flex align-items-center justify-content-center min-vh-100 px-3">
        <section class="login-card rounded-4 shadow-lg p-5 text-white">
            <div class="text-center mb-4">
                <div class="login-icon mb-3">🔒</div>
                <h1 class="h4 fw-bold mb-1">Sign in</h1>
                <p class="text-secondary mb-0">Access the ALS administration portal</p>
            </div>
            <form class="login-form" novalidate>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label text-secondary">Email</label>
                    <input type="email" class="form-control login-input" id="loginEmail" placeholder="email" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control login-input" id="loginPassword" placeholder="password" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-semibold text-uppercase">Sign In</button>
                <p class="text-center text-secondary mt-3 mb-0">
                    Forgot the password? <a href="#" class="text-white text-decoration-underline">Click here</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
