<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNTS ALS 2027</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="loader-content">
      <div class="wrapper">
        <img id="finalGear" src="images/FinalGear.png" alt="Background gear" draggable="false" />
        <img id="testImg" src="images/testimg.png" alt="Test image" draggable="false" />

    </div>
    <footer class="loader-footer">
      <p>© 2026 Tagum National Trade School — Alternative Learning System.</p>
      <p>Developed by Onyx Rances Laputan</p>
    </footer>
