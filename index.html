<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNTS ALS 2027</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/ico" href="images/tntslogo.png" />
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle">
        <div class="container">
            <a class="navbar-brand fw-bold text-white tracking-wide d-flex align-items-center" href="#">
                <img src="images/alslogo.png" alt="ALS logo" class="me-2" style="height:24px; width:auto;">
                <span class="brand-text-alternative">Alternative </span>
                <span class="brand-text-learning">Learning </span>
                <span class="brand-text-system">System</span>
            </a>
            <button class="navbar-toggler border-secondary text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon navbar-dark"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-2 mt-3 mt-lg-0 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link nav-custom-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link nav-custom-link" href="#">Information</a></li>
                    <li class="nav-item"><a class="nav-link nav-custom-link" href="#">Roster</a></li>
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-outline-danger btn-sm px-3 fw-semibold text-uppercase" id="authBtn">Login</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        
        <header class="hero-banner p-5 mb-5 rounded shadow-lg border border-secondary-subtle position-relative overflow-hidden">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="display-4 fw-black text-white text-uppercase tracking-tight mb-0">TAGUM NATIONAL</h1>
                    <h1 class="display-4 fw-black text-warning text-uppercase tracking-tight mb-3">TRADE SCHOOL</h1>
                    <p class="text-secondary fs-5 tracking-wide">Grade 12 Cabrera and Alcala</p>
                </div>
                <div class="col-md-4 d-flex justify-content-center">
                    <div class="hero-image-box d-flex align-items-center justify-content-center p-3 rounded">
                        <img src="images/alslogo.png" alt="ALS logo" class="hero-box-logo img-fluid me-3">
                        <img src="images/tntslogo.png" alt="TNTS logo" class="hero-box-logo img-fluid">
                    </div>
                </div>
            </div>
        </header>

        <div class="row g-4">
            <main class="col-lg-8">
                <div class="d-flex justify-content-between align-items-baseline mb-2">
                    <div>
                        <h2 class="text-white text-uppercase tracking-wide fw-bold mb-0">Latest News</h2>
                        <span class="text-warning text-uppercase tracking-widest small-meta">Breaking Updates</span>
                    </div>
                    <button class="btn btn-warning btn-sm d-none fw-bold text-uppercase" id="createPostBtn" data-bs-toggle="modal" data-bs-target="#editorModal">
                        Create Post
                    </button>
                </div>
                <hr class="border-warning border-2 opacity-100 mt-1 mb-4">
                
                <div id="articleFeed">
                    <div class="text-center text-secondary py-5" id="feedLoader">Connecting to network secure servers...</div>
                </div>
            </main>

            <aside class="col-lg-4">
                <div class="card custom-card border-danger-subtle h-100">
                    <div class="card-body p-4">
                        <h2 class="h5 text-danger text-uppercase tracking-wide fw-bold mb-4">Quick Access</h2>
                        <div class="d-flex flex-column gap-3" id="rosterGrid">
                            <div class="roster-item p-3 rounded d-flex align-items-center justify-content-between">
                                <span class="text-white small fw-bold tracking-wide">📄 ACTIVE ROSTER</span>
                            </div>
                            <div class="roster-item p-3 rounded d-flex align-items-center justify-content-between">
                                <span class="text-white small fw-bold tracking-wide">ℹ️ BUREAU INFORMATION</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal fade" id="editorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark border border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white text-uppercase tracking-wide">Create New Post</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-dark text-white">
                    <div class="mb-3">
                        <label for="postTitle" class="form-label">Post Title</label>
                        <input type="text" id="postTitle" class="form-control bg-secondary text-white border-0" placeholder="Enter title here">
                    </div>
                    <div id="editor-container" class="bg-white rounded" style="min-height: 220px;"></div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-warning" id="publishPostBtn">Publish Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.min.js"></script>
    <script type="module" src="/app.js"></script>
</body>
</html>
